site_name: pisharp-piwebapi
site_description: A modern Python SDK for PI Web API
site_url: https://pisharp.com/developer-hub/pi-web-api/sdk
repo_url: https://github.com/Vedteq/pisharp-piwebapi-python
repo_name: Vedteq/pisharp-piwebapi-python

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - search.highlight

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - API Reference:
      - Client: api/client.md
      - Points: api/points.md
      - Streams: api/streams.md
      - Elements: api/elements.md
      - Event Frames: api/eventframes.md
      - Servers & Databases: api/servers.md
      - Batch: api/batch.md
      - Pagination: api/pagination.md
      - Models: api/models.md
      - Exceptions: api/exceptions.md
  - Code Generator: codegen.md
  - Changelog: changelog.md

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          options:
            show_source: false
            show_root_heading: true
            members_order: source

markdown_extensions:
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - admonition
  - pymdownx.details
